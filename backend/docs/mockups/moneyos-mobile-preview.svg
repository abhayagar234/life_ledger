    <text x="42" y="218" fill="#5D6A66" font-family="Arial, sans-serif" font-size="18">Track income, expense, cash, and</text>
    <text x="42" y="243" fill="#5D6A66" font-family="Arial, sans-serif" font-size="18">loans in one calm place.</text>
