  <text x="92" y="926" fill="#21313A" font-family="Arial, sans-serif" font-size="18" font-weight="700">Current visual direction</text>
  <text x="92" y="954" fill="#5D6A66" font-family="Arial, sans-serif" font-size="16">Warm palette, calm premium cards, large type, one-question onboarding, and persona-led dashboards.</text>

  <defs>
