    <rect x="200" y="454" width="146" height="84" rx="22" fill="#FFFFFF" stroke="#D7CBB9"/>
    <rect x="42" y="550" width="146" height="84" rx="22" fill="#FFFFFF" stroke="#D7CBB9"/>
    <rect x="200" y="550" width="146" height="84" rx="22" fill="#FFFFFF" stroke="#D7CBB9"/>
    <text x="64" y="486" fill="#21313A" font-family="Arial, sans-serif" font-size="17" font-weight="700">Add Sale</text>
    <text x="64" y="508" fill="#6C766F" font-family="Arial, sans-serif" font-size="13">record money in</text>
    <text x="222" y="486" fill="#21313A" font-family="Arial, sans-serif" font-size="17" font-weight="700">Add Expense</text>
    <text x="222" y="508" fill="#6C766F" font-family="Arial, sans-serif" font-size="13">track costs</text>
    <text x="64" y="582" fill="#21313A" font-family="Arial, sans-serif" font-size="17" font-weight="700">Add Due</text>
    <text x="64" y="604" fill="#6C766F" font-family="Arial, sans-serif" font-size="13">owed or payable</text>
    <text x="222" y="582" fill="#21313A" font-family="Arial, sans-serif" font-size="17" font-weight="700">Set Cash</text>
    <text x="222" y="604" fill="#6C766F" font-family="Arial, sans-serif" font-size="13">sync cash on hand</text>
