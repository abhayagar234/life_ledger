version: 1
default_category: uncategorized
confidence_thresholds:
  high: 0.90
  good: 0.75
  weak: 0.50
  unresolved_below: 0.50

rule_hierarchy:
  - structured_rules
  - merchant_rules
  - keyword_rules
  - regex_rules
  - transfer_rules
  - recurring_overlay
  - fixed_obligation_overlay
  - unresolved_queue

categories:
  - groceries
  - health
  - entertainment
  - travel
  - bills
  - shopping
  - salary_income
  - emi_loans
  - rent
  - subscriptions
  - credit_card_payment
  - savings_investments
  - farming_expense
  - business_expense
  - transfers
  - uncategorized

structured_rules:
  - id: salary_credit
    when:
      direction: credit
      description_keywords: [salary, payroll, salary credit, sal credit]
    category: salary_income
    confidence: 0.95

  - id: emi_payment
    when:
      description_keywords: [emi, loan repayment, finance, interest]
    category: emi_loans
    is_fixed_obligation: true
    confidence: 0.95

  - id: rent_payment
    when:
      description_keywords: [rent, house rent]
    category: rent
    is_fixed_obligation: true
    confidence: 0.95

  - id: transfer_self
    when:
      description_keywords: [cash withdrawal, self transfer, own account, wallet add cash]
    category: transfers
    confidence: 0.95

