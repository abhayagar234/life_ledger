openapi: 3.1.0
info:
  title: Life Ledger MoneyOS API
  version: 0.1.0
  description: >
    MVP mobile-friendly backend contract for MoneyOS. This contract keeps the API
    simple and practical for onboarding, ledger tracking, loans, planning, and
    future ingestion and coaching extensions.
servers:
  - url: http://127.0.0.1:8000
paths:
  /auth/demo-login:
    post:
      summary: Create or reuse a demo user
  /profile:
    get:
      summary: Fetch current user's financial profile
  /profile/onboarding:
    put:
      summary: Upsert onboarding and financial profile settings
  /ledger-entries:
    get:
      summary: List manual ledger entries
    post:
      summary: Create a manual ledger entry
  /loans:
    get:
      summary: List loans
    post:
      summary: Create a loan
  /loans/{loan_id}:
    patch:
      summary: Update loan status or summary fields
  /emi-payments:
    get:
      summary: List EMI payments
    post:
      summary: Create an EMI payment record
  /emi-payments/{emi_payment_id}:
    patch:
      summary: Update EMI payment status or paid amount
  /budgets:
    get:
      summary: List budgets
    post:
      summary: Create a budget
  /budgets/{budget_id}:
    patch:
      summary: Update a budget
  /goals:
    get:
      summary: List goals
    post:
      summary: Create a goal
  /goals/{goal_id}:
    patch:
      summary: Update a goal
  /imports/files:
    post:
      summary: Upload a transaction file for ingestion
      description: >
        Upload and process a transaction file. CSV normalization is implemented.
        XLSX and XLS readers are wired in and require the matching parser dependencies.
  /insights:
    get:
      summary: List lightweight insight cards
      description: Stub endpoint returning demo-safe insight cards
  /coach/messages:
    post:
      summary: Send a message to the MoneyOS coach
      description: Stub endpoint returning a simple coaching reply
  /monthly-summaries/{year}/{month}:
    get:
      summary: Build or fetch a monthly summary
components:
  parameters:
    userId:
      in: query
      name: user_id
      required: false
      schema:
        type: string
      description: Demo user id for auth-light development
tags:
  - name: auth
  - name: profile
  - name: ledger entries
  - name: loans
  - name: emi payments
  - name: budgets
  - name: goals
  - name: imports
  - name: insights
  - name: coach
  - name: monthly summaries
